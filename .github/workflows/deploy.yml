name: deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        type: choice
        options:
          - staging
          - production

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOYER_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - run: chmod +x infra/cloud-run/bootstrap-iam.sh infra/cloud-run/deploy.sh
      - run: infra/cloud-run/bootstrap-iam.sh "${{ inputs.environment }}"
      - run: infra/cloud-run/deploy.sh "${{ inputs.environment }}"
        env:
          RUN_MIGRATIONS_ON_DEPLOY: "true"
