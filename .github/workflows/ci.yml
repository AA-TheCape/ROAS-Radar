name: ci-cd

on:
  pull_request:
  push:
    branches:
      - main
      - work/**
    tags:
      - 'v*'

jobs:
  backend-quality:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci --include=dev
      - run: npm run lint
      - run: npm run build
      - run: npm run test:unit

  dashboard-quality:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      - run: npm ci --include=dev
      - run: npm ci --include=dev
        working-directory: dashboard
      - run: npm run lint
        working-directory: dashboard
      - run: npm run build
        working-directory: dashboard

  migration-and-integration:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: roas_radar
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d roas_radar"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/roas_radar
      REPORTING_API_TOKEN: test-token

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci --include=dev
      - run: npm run db:migrate:check
      - run: npm run test:integration

  deploy-staging:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs:
      - backend-quality
      - dashboard-quality
      - migration-and-integration
    runs-on: ubuntu-latest
    environment: staging
    concurrency:
      group: deploy-staging
      cancel-in-progress: false
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOYER_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - run: chmod +x infra/cloud-run/bootstrap-iam.sh infra/cloud-run/deploy.sh
      - run: infra/cloud-run/bootstrap-iam.sh staging
      - run: infra/cloud-run/deploy.sh staging
        env:
          RUN_MIGRATIONS_ON_DEPLOY: "true"

  deploy-production:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    needs:
      - backend-quality
      - dashboard-quality
      - migration-and-integration
    runs-on: ubuntu-latest
    environment: production
    concurrency:
      group: deploy-production
      cancel-in-progress: false
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOYER_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - run: chmod +x infra/cloud-run/bootstrap-iam.sh infra/cloud-run/deploy.sh
      - run: infra/cloud-run/bootstrap-iam.sh production
      - run: infra/cloud-run/deploy.sh production
        env:
          RUN_MIGRATIONS_ON_DEPLOY: "true"
